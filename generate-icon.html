<!DOCTYPE html>
<html>
<head>
    <title>Generate Icon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .icon-container {
            margin: 20px 0;
        }
        canvas {
            border: 1px solid #ccc;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>SimpleTask Icon Generator</h1>
    <p>点击按钮生成不同尺寸的图标</p>
    
    <div class="icon-container">
        <canvas id="canvas16" width="16" height="16"></canvas>
        <canvas id="canvas32" width="32" height="32"></canvas>
        <canvas id="canvas48" width="48" height="48"></canvas>
        <canvas id="canvas128" width="128" height="128"></canvas>
    </div>
    
    <button onclick="generateIcons()">生成图标</button>
    <button onclick="downloadIcons()">下载所有图标</button>
    
    <script>
        function drawIcon(ctx, size) {
            const scale = size / 128;
            
            // Background
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, 20 * scale);
            ctx.fill();
            
            // Checkmark
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 12 * scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(28 * scale, 64 * scale);
            ctx.lineTo(52 * scale, 88 * scale);
            ctx.lineTo(100 * scale, 40 * scale);
            ctx.stroke();
            
            // Task lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 8 * scale;
            ctx.lineCap = 'round';
            
            // Line 1
            ctx.beginPath();
            ctx.moveTo(32 * scale, 32 * scale);
            ctx.lineTo(96 * scale, 32 * scale);
            ctx.stroke();
            
            // Line 2
            ctx.beginPath();
            ctx.moveTo(32 * scale, 48 * scale);
            ctx.lineTo(80 * scale, 48 * scale);
            ctx.stroke();
        }
        
        function generateIcons() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`canvas${size}`);
                const ctx = canvas.getContext('2d');
                drawIcon(ctx, size);
            });
        }
        
        function downloadIcons() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`canvas${size}`);
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        
        // Auto-generate on load
        window.onload = generateIcons;
    </script>
</body>
</html>
