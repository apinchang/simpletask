<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简单任务 - 新标签页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container my-5">
    <header class="mb-5">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="display-5">🏠 简单任务</h1>
          <p class="text-muted">20%的工作带来80%的效益</p>
        </div>
        <div class="d-flex gap-3">
          <button class="btn btn-outline-secondary rounded-circle p-3" id="history-button">📜</button>
          <button class="btn btn-outline-secondary rounded-circle p-3" id="export-button">📤</button>
          <button class="btn btn-outline-secondary rounded-circle p-3" id="import-button">📥</button>
        </div>
      </div>
    </header>

    <div class="row gap-4">
      <section class="col-md-4 category urgent-important">
        <div class="mb-3 d-flex justify-content-between align-items-center">
          <h3 class="h5 mb-0">🔥 重要且紧急</h3>
          <span class="badge bg-primary category-badge">0</span>
        </div>
        <div class="mb-4">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="添加任务...">
            <button class="btn btn-primary add-button">+</button>
          </div>
        </div>
        <ul class="task-list list-unstyled"></ul>
      </section>

      <section class="col-md-4 category important">
        <div class="mb-3 d-flex justify-content-between align-items-center">
          <h3 class="h5 mb-0">⏳ 重要不紧急</h3>
          <span class="badge bg-primary category-badge">0</span>
        </div>
        <div class="mb-4">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="添加任务...">
            <button class="btn btn-primary add-button">+</button>
          </div>
        </div>
        <ul class="task-list list-unstyled"></ul>
      </section>

      <section class="col-md-4 category not-important">
        <div class="mb-3 d-flex justify-content-between align-items-center">
          <h3 class="h5 mb-0">📦 不重要不紧急</h3>
          <span class="badge bg-primary category-badge">0</span>
        </div>
        <div class="mb-4">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="添加任务...">
            <button class="btn btn-primary add-button">+</button>
          </div>
        </div>
        <ul class="task-list list-unstyled"></ul>
      </section>
    </div>

    <footer class="mt-5">
      <div class="text-center">
        <div class="copyright text-muted">© 2026 简单任务</div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Sortable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
