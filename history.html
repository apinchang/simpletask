<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史任务 - 简单任务</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      padding: 20px;
    }
    
    .history-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: transparent;
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 20px;
    }
    
    .back-button:hover {
      background-color: rgba(0,0,0,0.05);
    }
    
    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .history-item {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      transition: var(--transition);
    }
    
    .history-item:hover {
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    
    .history-item-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .history-item-text {
      flex: 1;
      margin-right: 16px;
    }
    
    .history-item-meta {
      text-align: right;
      font-size: 0.8em;
      color: var(--text-secondary);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="history-container">
    <button class="back-button" onclick="window.open('chrome://newtab', '_self')">
      ← 返回任务看板
    </button>
    
    <h1>📜 历史任务</h1>
    <p>已完成的任务记录</p>
    
    <ul class="history-list" id="history-list">
      <!-- 历史任务将通过JavaScript动态添加 -->
    </ul>
    
    <div class="empty-state" id="empty-state">
      <p>暂无历史任务记录</p>
    </div>
  </div>
  
  <script>
    // 加载历史任务
    function loadHistory() {
      chrome.storage.local.get(['historyTasks'], function(result) {
        const historyTasks = result.historyTasks || [];
        const historyList = document.getElementById('history-list');
        const emptyState = document.getElementById('empty-state');
        
        if (historyTasks.length === 0) {
          emptyState.style.display = 'block';
          historyList.style.display = 'none';
          return;
        }
        
        emptyState.style.display = 'none';
        historyList.style.display = 'block';
        
        // 按时间倒序排序
        historyTasks.sort((a, b) => {
          const dateA = a.completedAt || a.deletedAt || 0;
          const dateB = b.completedAt || b.deletedAt || 0;
          return dateB - dateA;
        });
        
        // 清空列表
        historyList.innerHTML = '';
        
        // 添加历史任务
        historyTasks.forEach(task => {
          const li = document.createElement('li');
          li.className = 'history-item';
          
          const date = task.completedAt || task.deletedAt;
          const formattedDate = new Date(date).toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
          
          li.innerHTML = `
            <div class="history-item-content">
              <div class="history-item-text">
                <p>${task.text}</p>
              </div>
              <div class="history-item-meta">
                <div>${task.category}</div>
                <div>${formattedDate}</div>
              </div>
            </div>
          `;
          
          historyList.appendChild(li);
        });
      });
    }
    
    // 页面加载时加载历史任务
    document.addEventListener('DOMContentLoaded', loadHistory);
  </script>
</body>
</html>
