<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>历史任务 - 简单任务</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .history-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    #history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    #history-table th,
    #history-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    #history-table th {
      background-color: #f9f9f9;
      font-weight: bold;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    
    .btn-recover {
      background-color: #27ae60;
      color: white;
    }
    
    .btn-delete {
      background-color: #e74c3c;
      color: white;
    }
    
    .btn:hover {
      opacity: 0.8;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <header>
    <h1>📜 历史任务</h1>
    <p>已删除的任务记录</p>
    <nav class="nav-links">
      <a href="newtab.html">🏠 返回主页</a>
    </nav>
  </header>

  <div class="history-container">
    <table id="history-table">
      <thead>
        <tr>
          <th>任务内容</th>
          <th>创建时间</th>
          <th>删除时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <!-- 历史任务将通过JavaScript动态添加 -->
      </tbody>
    </table>
  </div>

  <footer>
    <div class="footer-content">
      <div class="copyright">© 2026 简单任务</div>
      <div class="footer-links">
        <a href="newtab.html">🏠 主页</a>
        <a href="#" id="export-link">📤 导出</a>
        <a href="#" id="import-link">📥 导入</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
