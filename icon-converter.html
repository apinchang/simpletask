<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icon Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .icon-preview {
            margin: 20px;
            padding: 20px;
            border: 2px dashed #ccc;
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #2980b9;
        }
        .info {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🎨 SimpleTask 图标生成器</h1>
    
    <div class="info">
        <p>点击下面的按钮生成不同尺寸的PNG图标</p>
        <p>生成的图标将自动下载到您的下载文件夹</p>
    </div>
    
    <div class="icon-preview">
        <svg id="source-svg" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
            <rect width="128" height="128" rx="20" fill="#3498db"/>
            <path d="M 28 64 L 52 88 L 100 40" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="32" y1="32" x2="96" y2="32" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
            <line x1="32" y1="48" x2="80" y2="48" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
        </svg>
    </div>
    
    <div>
        <button onclick="generateIcon(16)">生成 16x16 图标</button>
        <button onclick="generateIcon(32)">生成 32x32 图标</button>
        <button onclick="generateIcon(48)">生成 48x48 图标</button>
        <button onclick="generateIcon(128)">生成 128x128 图标</button>
    </div>
    
    <div>
        <button onclick="generateAllIcons()" style="background: #27ae60;">生成所有图标</button>
    </div>
    
    <canvas id="canvas" style="display: none;"></canvas>
    
    <script>
        function generateIcon(size) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            
            // Get SVG data
            const svg = document.getElementById('source-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                
                // Download
                const link = document.createElement('a');
                link.download = size === 128 ? 'icon128.png' : `icon${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                console.log(`Generated ${link.download}`);
            };
            
            img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
        }
        
        function generateAllIcons() {
            const sizes = [16, 32, 48, 128];
            let delay = 0;
            
            sizes.forEach(size => {
                setTimeout(() => {
                    generateIcon(size);
                }, delay);
                delay += 500; // 500ms delay between each download
            });
        }
        
        // Auto-generate all icons on page load
        window.onload = function() {
            setTimeout(generateAllIcons, 1000);
        };
    </script>
</body>
</html>
